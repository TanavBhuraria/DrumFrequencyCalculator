<!DOCTYPE html>
<html>
<head>
    <title>Wave Visualisation</title>
    <style>
        canvas {
            border: 1px solid black;
            display: block;
            margin: 20px auto;
        }
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        label {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1 style="text-align:center;">Customisable Wave Visualiser</h1>
    <canvas id="waveCanvas" width="800" height="400"></canvas>

    <div class="controls">
        <label>Amplitude:
            <input type="range" id="amplitude" min="20" max="200" value="100">
        </label>
        <label>Wavelength:
            <input type="range" id="wavelength" min="50" max="500" value="200">
        </label>
        <label>Speed:
            <input type="range" id="speed" min="1" max="10" value="5">
        </label>
        <label>Time Period:
            <input type="range" id="period" min="1" max="10" value="5">
        </label>
    </div>

    <script>
        const canvas = document.getElementById("waveCanvas");
        const ctx = canvas.getContext("2d");

        let amplitude = document.getElementById("amplitude").value;
        let wavelength = document.getElementById("wavelength").value;
        let speed = document.getElementById("speed").value;
        let period = document.getElementById("period").value;

        function drawWave(time) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw axes with thicker lines
            ctx.lineWidth = 2;
            ctx.strokeStyle = "black";
            ctx.beginPath();
            ctx.moveTo(0, canvas.height/2);
            ctx.lineTo(canvas.width, canvas.height/2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0);
            ctx.lineTo(canvas.width/2, canvas.height);
            ctx.stroke();

            // Draw wave with thicker line
            ctx.lineWidth = 3;
            ctx.strokeStyle = "blue";
            ctx.beginPath();
            for (let x = 0; x < canvas.width; x++) {
                let y = canvas.height/2 + amplitude * Math.sin((x / wavelength) * 2 * Math.PI - time * speed);
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function animate(time) {
            amplitude = document.getElementById("amplitude").value;
            wavelength = document.getElementById("wavelength").value;
            speed = document.getElementById("speed").value;
            period = document.getElementById("period").value;

            drawWave(time / (1000 / period));
            requestAnimationFrame(animate);
        }

        animate(0);
    </script>
</body>
</html>
