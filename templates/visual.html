<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wave Test</title>
  <style>body{margin:0;overflow:hidden;background:black}</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.set(0,100,400);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0,0,0);
controls.update();

// Axes
const axisMat = new THREE.LineBasicMaterial({color:0xFFFFFF});
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-1000,0,0),new THREE.Vector3(1000,0,0)]),axisMat));
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-500,0),new THREE.Vector3(0,500,0)]),axisMat));
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,-500),new THREE.Vector3(0,0,500)]),axisMat));

// Wave
const segments=2000;
const pos=new Float32Array(segments*3);
for(let i=0;i<segments;i++){
  const x=i-segments/2;
  pos[i*3]=x;
  pos[i*3+1]=100*Math.sin(x/50);
  pos[i*3+2]=0;
}
const geom=new THREE.BufferGeometry();
geom.setAttribute('position',new THREE.BufferAttribute(pos,3));
const wave=new THREE.Line(geom,new THREE.LineBasicMaterial({color:0xFFD700}));
scene.add(wave);

function animate(t){
  const arr=wave.geometry.attributes.position.array;
  for(let i=0;i<segments;i++){
    const x=i-segments/2;
    arr[i*3]=x;
    arr[i*3+1]=100*Math.sin((x/50)-t/1000*5);
    arr[i*3+2]=0;
  }
  wave.geometry.attributes.position.needsUpdate=true;
  controls.update();
  renderer.render(scene,camera);
  requestAnimationFrame(animate);
}
animate(0);
</script>
</body>
</html>
