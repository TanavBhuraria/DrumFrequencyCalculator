<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hybrid Drum Wave Visualiser</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body{height:100%;margin:0;background:#000;color:#FFD700;font-family:Inter,system-ui,Arial,sans-serif}
    #canvas{position:fixed;inset:0;z-index:1;display:block;width:100%;height:100%;background:#000}
    .controls{position:absolute;top:12px;left:12px;z-index:40;background:rgba(0,0,0,0.78);border:1px solid #FFD700;padding:12px;border-radius:8px;min-width:380px}
    .controls h3{margin:0 0 8px 0;color:#FFD700;font-size:15px}
    .row{display:flex;align-items:center;gap:8px;margin:6px 0}
    label{font-size:13px;color:#FFD700;min-width:120px}
    input[type=range]{flex:1;accent-color:#FFD700}
    input[type=number]{width:84px;background:#111;color:#FFD700;border:1px solid #333;padding:4px 6px;border-radius:4px}
    button,select{background:#111;color:#FFD700;border:1px solid #333;padding:6px 8px;border-radius:6px;cursor:pointer}
    .small{font-size:12px;color:#ccc;margin-top:8px}
    .right{margin-left:auto}
    .hint{position:absolute;left:12px;bottom:12px;z-index:40;color:#999;background:rgba(0,0,0,0.5);padding:8px;border-radius:6px;border:1px solid rgba(255,215,0,0.08);font-size:12px}
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="controls" id="controls">
    <h3>Hybrid Drum Wave Visualiser</h3>

    <div class="row">
      <label>Amplitude</label>
      <input id="amplitude" type="range" min="1" max="800" step="1" value="100">
      <input id="amplitudeNum" type="number" min="1" max="800" step="1" value="100">
    </div>

    <div class="row">
      <label>Wavelength</label>
      <input id="wavelength" type="range" min="8" max="1200" step="1" value="200">
      <input id="wavelengthNum" type="number" min="8" max="1200" step="1" value="200">
    </div>

    <div class="row">
      <label>Frequency Hz</label>
      <input id="frequency" type="range" min="0.1" max="10" step="0.1" value="2">
      <input id="frequencyNum" type="number" min="0.1" max="10" step="0.1" value="2">
    </div>

    <div class="row">
      <label>Drift</label>
      <input id="drift" type="range" min="0" max="100" step="1" value="20">
      <input id="driftNum" type="number" min="0" max="100" step="1" value="20">
    </div>

    <div class="row">
      <label>Style</label>
      <select id="style">
        <option value="line">Line</option>
        <option value="ribbon">Ribbon</option>
      </select>
      <button id="gridToggle">Toggle Grid</button>
      <button id="exportPNG" class="right">Export PNG</button>
    </div>

    <div class="row">
      <button id="zoomIn">Zoom In (+)</button>
      <button id="zoomOut">Zoom Out (-)</button>
      <button id="fitView">Fit View (0)</button>
      <div class="small right">Drag to pan • Scroll to zoom</div>
    </div>
  </div>

  <div class="hint">Hybrid: oscillation × slow drift. Drift mapping is gentle so 20% is subtle.</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { alpha: false });

  const ui = {
    amplitude: document.getElementById('amplitude'),
    amplitudeNum: document.getElementById('amplitudeNum'),
    wavelength: document.getElementById('wavelength'),
    wavelengthNum: document.getElementById('wavelengthNum'),
    frequency: document.getElementById('frequency'),
    frequencyNum: document.getElementById('frequencyNum'),
    drift: document.getElementById('drift'),
    driftNum: document.getElementById('driftNum'),
    style: document.getElementById('style'),
    gridToggle: document.getElementById('gridToggle'),
    zoomIn: document.getElementById('zoomIn'),
    zoomOut: document.getElementById('zoomOut'),
    fitView: document.getElementById('fitView'),
    exportPNG: document.getElementById('exportPNG')
  };

  function sync(rangeEl, numEl, setter) {
    rangeEl.addEventListener('input', () => { numEl.value = rangeEl.value; setter(+rangeEl.value); });
    numEl.addEventListener('input', () => { rangeEl.value = numEl.value; setter(+numEl.value); });
  }

  const state = {
    amplitude: +ui.amplitude.value,
    wavelength: +ui.wavelength.value,
    frequency: +ui.frequency.value,
    driftUI: +ui.drift.value, // UI 0..100
    style: ui.style.value,
    grid: false,
    zoom: 1,
    offsetX: 0,
    offsetY: 0
  };

  sync(ui.amplitude, ui.amplitudeNum, v => state.amplitude = v);
  sync(ui.wavelength, ui.wavelengthNum, v => state.wavelength = v);
  sync(ui.frequency, ui.frequencyNum, v => state.frequency = v);
  sync(ui.drift, ui.driftNum, v => state.driftUI = v);
  ui.style.addEventListener('change', () => state.style = ui.style.value);
  ui.gridToggle.addEventListener('click', () => state.grid = !state.grid);

  function resize() {
    const DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
    canvas.width = Math.floor(window.innerWidth * DPR);
    canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // pan
  let dragging = false, lastX = 0, lastY = 0;
  canvas.addEventListener('mousedown', (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; canvas.style.cursor = 'grabbing'; });
  window.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'default'; });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    state.offsetX += dx / state.zoom;
    state.offsetY += dy / state.zoom;
  });

  // zoom centered on mouse
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = -e.deltaY;
    const zoomFactor = Math.exp(delta * 0.0012);
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - rect.width/2) / state.zoom - state.offsetX;
    const my = (e.clientY - rect.top - rect.height/2) / state.zoom - state.offsetY;
    const newZoom = Math.max(0.2, Math.min(6, state.zoom * zoomFactor));
    state.offsetX -= mx * (1 - 1/zoomFactor);
    state.offsetY -= my * (1 - 1/zoomFactor);
    state.zoom = newZoom;
  }, { passive: false });

  function smoothZoom(targetZoom, duration = 220) {
    const start = state.zoom;
    const startTime = performance.now();
    function step() {
      const now = performance.now();
      const p = Math.min(1, (now - startTime) / duration);
      const ease = p * (2 - p);
      state.zoom = start + (targetZoom - start) * ease;
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  ui.zoomIn.addEventListener('click', () => smoothZoom(Math.min(6, state.zoom * 1.4)));
  ui.zoomOut.addEventListener('click', () => smoothZoom(Math.max(0.2, state.zoom / 1.4)));
  ui.fitView.addEventListener('click', () => { state.zoom = 1; state.offsetX = 0; state.offsetY = 0; });

  window.addEventListener('keydown', (e) => {
    if (e.key === '+' || e.key === '=') smoothZoom(Math.min(6, state.zoom * 1.4));
    if (e.key === '-' || e.key === '_') smoothZoom(Math.max(0.2, state.zoom / 1.4));
    if (e.key === '0') { state.zoom = 1; state.offsetX = 0; state.offsetY = 0; }
  });

  ui.exportPNG.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'hybrid-drum-wave.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  const WORLD_WIDTH = 2000;

  function chooseNiceTick(desired) {
    if (desired <= 0) return 1;
    const pow = Math.pow(10, Math.floor(Math.log10(desired)));
    const d = desired / pow;
    if (d <= 1.5) return 1 * pow;
    if (d <= 3.5) return 2 * pow;
    if (d <= 7.5) return 5 * pow;
    return 10 * pow;
  }

  function formatNumber(v) {
    if (Math.abs(v) < 1e-9) return '0';
    if (Math.abs(v - Math.round(v)) < 1e-6) return String(Math.round(v));
    if (Math.abs(v) < 1000 && Math.abs(v) >= 0.01) return v.toFixed(2).replace(/\.00$/, '');
    return v.toFixed(2);
  }

  function drawAxesAndTicks(W, H, cx, cy) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(state.zoom, state.zoom);
    ctx.translate(state.offsetX, state.offsetY);

    if (state.grid) {
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1 / state.zoom;
      const gridSpacing = 100;
      for (let gx = -WORLD_WIDTH; gx <= WORLD_WIDTH; gx += gridSpacing) {
        ctx.beginPath(); ctx.moveTo(gx, -H*2); ctx.lineTo(gx, H*2); ctx.stroke();
      }
      for (let gy = -1000; gy <= 1000; gy += gridSpacing) {
        ctx.beginPath(); ctx.moveTo(-WORLD_WIDTH*2, gy); ctx.lineTo(WORLD_WIDTH*2, gy); ctx.stroke();
      }
    }

    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 1 / state.zoom;
    ctx.beginPath(); ctx.moveTo(-WORLD_WIDTH/2, 0); ctx.lineTo(WORLD_WIDTH/2, 0); ctx.stroke();
    const viewHWorld = (H/2) / state.zoom;
    ctx.beginPath(); ctx.moveTo(-WORLD_WIDTH/2, -viewHWorld*2); ctx.lineTo(WORLD_WIDTH/2, -viewHWorld*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-WORLD_WIDTH/2, -10000); ctx.lineTo(-WORLD_WIDTH/2, 10000); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(WORLD_WIDTH/2, -10000); ctx.lineTo(WORLD_WIDTH/2, 10000); ctx.stroke();

    ctx.fillStyle = '#FFFFFF';
    ctx.font = `${12 / state.zoom}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    const approxPixelsPerTick = 80;
    const worldPerPixel = (W / state.zoom) / WORLD_WIDTH;
    const desiredWorldTick = approxPixelsPerTick * worldPerPixel;
    const tickBase = chooseNiceTick(desiredWorldTick);
    const minX = -WORLD_WIDTH/2 - state.offsetX - (W/2)/state.zoom;
    const maxX = WORLD_WIDTH/2 - state.offsetX + (W/2)/state.zoom;
    for (let x = Math.ceil(minX / tickBase) * tickBase; x <= maxX; x += tickBase) {
      const sx = x;
      ctx.beginPath(); ctx.moveTo(sx, -4 / state.zoom); ctx.lineTo(sx, 4 / state.zoom); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx, -viewHWorld*2 - 4 / state.zoom); ctx.lineTo(sx, -viewHWorld*2 + 4 / state.zoom); ctx.stroke();
      const label = formatNumber(x);
      ctx.fillText(label, sx, 6 / state.zoom);
      ctx.fillText(label, sx, -viewHWorld*2 - 16 / state.zoom);
    }

    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    const approxPixelsPerTickY = 60;
    const desiredWorldTickY = approxPixelsPerTickY * worldPerPixel;
    const tickBaseY = chooseNiceTick(desiredWorldTickY);
    const minY = -1000 - state.offsetY - (H/2)/state.zoom;
    const maxY = 1000 - state.offsetY + (H/2)/state.zoom;
    for (let y = Math.ceil(minY / tickBaseY) * tickBaseY; y <= maxY; y += tickBaseY) {
      const sy = y;
      ctx.beginPath(); ctx.moveTo(-WORLD_WIDTH/2 - 4 / state.zoom, sy); ctx.lineTo(-WORLD_WIDTH/2 + 4 / state.zoom, sy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(WORLD_WIDTH/2 - 4 / state.zoom, sy); ctx.lineTo(WORLD_WIDTH/2 + 4 / state.zoom, sy); ctx.stroke();
      ctx.fillText(formatNumber(y), -WORLD_WIDTH/2 - 8 / state.zoom, sy);
      ctx.textAlign = 'left';
      ctx.fillText(formatNumber(y), WORLD_WIDTH/2 + 8 / state.zoom, sy);
      ctx.textAlign = 'right';
    }

    ctx.restore();
  }

  // Render loop: hybrid y(x,t) = A * sin(k*(x - v t)) * cos(omega t)
  let last = performance.now();
  function render(now) {
    const dt = (now - last) / 1000; last = now;
    const t = now / 1000;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
    const W = canvas.width / DPR;
    const H = canvas.height / DPR;
    const cx = W / 2, cy = H / 2;

    // Clamp amplitude to safe range (half viewport height)
    const maxAmp = Math.max(4, Math.floor((H * 0.45)));
    const A = Math.min(Math.max(1, state.amplitude), maxAmp);

    // Wavelength safe minimum
    const lambda = Math.max(8, state.wavelength);

    // Frequency (Hz) -> angular frequency
    const freq = Math.max(0.01, state.frequency);
    const omega = 2 * Math.PI * freq;

    // Drift mapping: UI 0..100 -> gentle velocity in pixels/sec
    // Nonlinear mapping so low UI values are very subtle
    const driftUI = Math.max(0, Math.min(100, state.driftUI));
    // mapping: v = base + (driftUI/100)^2 * maxV
    const baseV = 0.0;
    const maxV = Math.max(10, Math.min(600, lambda * 0.6)); // cap relative to wavelength
    const v = baseV + Math.pow(driftUI / 100, 2) * maxV;

    const k = (2 * Math.PI) / lambda;

    // Dynamic sampling: more samples when wavelength is small
    const samples = Math.min(4000, Math.max(600, Math.ceil((WORLD_WIDTH / lambda) * 12)));
    const step = WORLD_WIDTH / samples;

    drawAxesAndTicks(W, H, cx, cy);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(state.zoom, state.zoom);
    ctx.translate(state.offsetX, state.offsetY);

    if (state.style === 'line') {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 2 / state.zoom;
      ctx.beginPath();
      for (let i = 0; i <= samples; i++) {
        const worldX = (i - samples/2) * step;
        const phaseX = worldX - v * t; // drift applied to x
        const y = A * Math.sin(k * phaseX) * Math.cos(omega * t);
        const screenX = Math.round(worldX * DPR) / DPR;
        const screenY = Math.round(-y * DPR) / DPR;
        if (i === 0) ctx.moveTo(screenX, screenY); else ctx.lineTo(screenX, screenY);
      }
      ctx.stroke();
    } else {
      const thickness = Math.max(4, A * 0.12);
      const top = [], bottom = [];
      for (let i = 0; i <= samples; i++) {
        const worldX = (i - samples/2) * step;
        const phaseX = worldX - v * t;
        const y = A * Math.sin(k * phaseX) * Math.cos(omega * t);
        const screenX = Math.round(worldX * DPR) / DPR;
        const screenY = Math.round(-y * DPR) / DPR;
        top.push([screenX, screenY]);
        bottom.push([screenX, screenY + thickness]);
      }
      ctx.beginPath();
      for (let i = 0; i < top.length; i++) {
        const p = top[i];
        if (i === 0) ctx.moveTo(p[0], p[1]); else ctx.lineTo(p[0], p[1]);
      }
      for (let i = bottom.length - 1; i >= 0; i--) {
        const p = bottom[i];
        ctx.lineTo(p[0], p[1]);
      }
      ctx.closePath();
      const grad = ctx.createLinearGradient(-WORLD_WIDTH/2, -A, WORLD_WIDTH/2, A + thickness);
      grad.addColorStop(0, '#FFD700');
      grad.addColorStop(1, '#552800');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 1.2 / state.zoom;
      ctx.stroke();
    }

    ctx.restore();
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);

  function fitView() { state.zoom = 1; state.offsetX = 0; state.offsetY = 0; }
  ui.fitView.addEventListener('click', fitView);

})();
</script>
</body>
</html>
