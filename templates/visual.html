<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wave Visualiser Debug</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body { height:100%; margin:0; background:#000; color:#FFD700; font-family:Inter,system-ui,Arial,sans-serif; }
    /* Canvas container sits behind controls */
    #canvas-container { position:fixed; inset:0; z-index:1; }
    canvas { display:block; width:100%; height:100%; }

    /* Controls overlay */
    .controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 30;
      background: rgba(0,0,0,0.75);
      border: 1px solid #FFD700;
      padding: 10px;
      border-radius: 8px;
      min-width: 260px;
    }
    .controls label { display:block; font-size:13px; color:#FFD700; margin:6px 0; }
    .controls input[type=range] { width:140px; vertical-align:middle; accent-color:#FFD700; }
    .controls input[type=number] { width:70px; margin-left:6px; background:#111; color:#FFD700; border:1px solid #333; padding:4px 6px; border-radius:4px; }

    /* Status overlay for diagnostics */
    #status {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 40;
      background: rgba(0,0,0,0.8);
      color:#fff;
      padding:8px 10px;
      border-radius:6px;
      font-size:13px;
      border:1px solid rgba(255,215,0,0.12);
      max-width:320px;
    }
    #status .ok { color:#7CFC00; }
    #status .err { color:#FF6B6B; }

    /* Small footer hint */
    .hint { position:absolute; left:12px; bottom:12px; z-index:30; color:#999; background:rgba(0,0,0,0.5); padding:6px 8px; border-radius:6px; border:1px solid rgba(255,215,0,0.08); font-size:12px; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="controls" id="controls">
    <label>Amplitude
      <input id="amplitude" type="range" min="10" max="300" step="1" value="100">
      <input id="amplitudeNum" type="number" min="10" max="300" step="1" value="100">
    </label>
    <label>Wavelength
      <input id="wavelength" type="range" min="20" max="800" step="1" value="200">
      <input id="wavelengthNum" type="number" min="20" max="800" step="1" value="200">
    </label>
    <label>Speed
      <input id="speed" type="range" min="0.1" max="20" step="0.1" value="5">
      <input id="speedNum" type="number" min="0.1" max="20" step="0.1" value="5">
    </label>
  </div>

  <div id="status">
    <div><strong>Status</strong></div>
    <div id="webglStatus">WebGL: <span id="webglFlag">checking…</span></div>
    <div id="errorMsg" style="margin-top:6px;"></div>
  </div>

  <div class="hint">If nothing appears, open DevTools Console (F12) and paste the output here.</div>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

  <script>
  // ===== Diagnostics helpers =====
  function logStatus(msg, isError=false) {
    console.log(msg);
    const el = document.getElementById('errorMsg');
    if (isError) {
      el.innerHTML = '<div class="err">' + msg + '</div>';
    } else {
      // append non-error messages
      el.innerHTML = '<div class="ok">' + msg + '</div>';
    }
  }

  // Append renderer canvas early so it can't be hidden by controls accidentally
  const container = document.getElementById('canvas-container');

  // ===== WebGL capability check =====
  function checkWebGL() {
    try {
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl2') || canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (!gl) return false;
      // quick capability checks
      const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
      const renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'unknown';
      console.log('GPU renderer:', renderer);
      return true;
    } catch (e) {
      console.warn('WebGL check threw', e);
      return false;
    }
  }

  const webglAvailable = checkWebGL();
  document.getElementById('webglFlag').textContent = webglAvailable ? 'available' : 'unavailable';
  if (!webglAvailable) {
    logStatus('WebGL not available in this browser. Falling back to Canvas2D.', true);
  } else {
    logStatus('WebGL available. Proceeding with Three.js.');
  }

  // ===== If WebGL unavailable, draw a Canvas2D fallback wave so you always see something =====
  if (!webglAvailable) {
    const fallbackCanvas = document.createElement('canvas');
    fallbackCanvas.style.position = 'fixed';
    fallbackCanvas.style.top = '0';
    fallbackCanvas.style.left = '0';
    fallbackCanvas.style.width = '100%';
    fallbackCanvas.style.height = '100%';
    fallbackCanvas.width = window.innerWidth;
    fallbackCanvas.height = window.innerHeight;
    fallbackCanvas.style.zIndex = '1';
    container.appendChild(fallbackCanvas);
    const ctx = fallbackCanvas.getContext('2d');
    let amp = 100, wl = 200, sp = 5;
    document.getElementById('amplitude').addEventListener('input', e => { amp = +e.target.value; document.getElementById('amplitudeNum').value = amp; });
    document.getElementById('wavelength').addEventListener('input', e => { wl = +e.target.value; document.getElementById('wavelengthNum').value = wl; });
    document.getElementById('speed').addEventListener('input', e => { sp = +e.target.value; document.getElementById('speedNum').value = sp; });
    document.getElementById('amplitudeNum').addEventListener('input', e => { amp = +e.target.value; document.getElementById('amplitude').value = amp; });
    document.getElementById('wavelengthNum').addEventListener('input', e => { wl = +e.target.value; document.getElementById('wavelength').value = wl; });
    document.getElementById('speedNum').addEventListener('input', e => { sp = +e.target.value; document.getElementById('speed').value = sp; });

    function drawFallback(t) {
      ctx.clearRect(0,0,fallbackCanvas.width,fallbackCanvas.height);
      ctx.fillStyle = '#000';
      ctx.fillRect(0,0,fallbackCanvas.width,fallbackCanvas.height);
      // axes
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, fallbackCanvas.height/2);
      ctx.lineTo(fallbackCanvas.width, fallbackCanvas.height/2);
      ctx.moveTo(fallbackCanvas.width/2, 0);
      ctx.lineTo(fallbackCanvas.width/2, fallbackCanvas.height);
      ctx.stroke();
      // wave
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      const midY = fallbackCanvas.height/2;
      const scaleX = 1; // pixel per sample
      const samples = Math.min(2000, Math.floor(fallbackCanvas.width / scaleX));
      for (let i=0;i<samples;i++){
        const x = i * scaleX;
        const worldX = (i - samples/2);
        const y = midY + amp * Math.sin((worldX / wl) * Math.PI * 2 - t/1000 * sp);
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      requestAnimationFrame(drawFallback);
    }
    requestAnimationFrame(drawFallback);
    // done fallback
  } else {
    // ===== WebGL path using Three.js =====
    try {
      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.domElement.style.position = 'fixed';
      renderer.domElement.style.top = '0';
      renderer.domElement.style.left = '0';
      renderer.domElement.style.width = '100%';
      renderer.domElement.style.height = '100%';
      renderer.domElement.style.zIndex = '1';
      container.appendChild(renderer.domElement);
      console.log('Renderer appended');

      // Scene and camera
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);
      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
      camera.position.set(0, 160, 520);

      // Controls - check availability
      let controls;
      if (typeof THREE.OrbitControls === 'function') {
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(0,0,0);
        controls.update();
        console.log('OrbitControls loaded from examples/js');
      } else if (THREE.OrbitControls) {
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0,0,0);
        controls.update();
        console.log('OrbitControls available');
      } else {
        console.warn('OrbitControls not found; continuing without orbit controls.');
        logStatus('OrbitControls not found; camera fixed. Use mouse wheel to zoom if supported.', true);
      }

      // Lights
      const ambient = new THREE.AmbientLight(0x404040, 1.2);
      scene.add(ambient);
      const dir = new THREE.DirectionalLight(0xffffff, 0.6);
      dir.position.set(0.5, 1, 0.5);
      scene.add(dir);

      // Axes (white)
      const axisMaterial = new THREE.LineBasicMaterial({ color: 0xFFFFFF });
      function makeAxis(p1, p2) {
        const g = new THREE.BufferGeometry().setFromPoints([p1, p2]);
        return new THREE.Line(g, axisMaterial);
      }
      scene.add(makeAxis(new THREE.Vector3(-2000,0,0), new THREE.Vector3(2000,0,0)));
      scene.add(makeAxis(new THREE.Vector3(0,-1000,0), new THREE.Vector3(0,1000,0)));
      scene.add(makeAxis(new THREE.Vector3(0,0,-1000), new THREE.Vector3(0,0,1000)));
      console.log('Axes added');

      // Wave geometry initialization
      let segments = 2000;
      let amplitude = +document.getElementById('amplitude').value;
      let wavelength = +document.getElementById('wavelength').value;
      let speed = +document.getElementById('speed').value;

      // BufferGeometry with explicit positions
      const positions = new Float32Array(segments * 3);
      for (let i = 0; i < segments; i++) {
        const x = (i - segments/2) * 1.0;
        positions[i*3] = x;
        positions[i*3+1] = amplitude * Math.sin((x / wavelength) * Math.PI * 2);
        positions[i*3+2] = 0;
      }
      const waveGeom = new THREE.BufferGeometry();
      waveGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      waveGeom.setDrawRange(0, segments);
      const waveMat = new THREE.LineBasicMaterial({ color: 0xFFD700 });
      const wave = new THREE.Line(waveGeom, waveMat);
      scene.add(wave);
      console.log('Wave geometry created with segments=', segments);

      // UI sync helpers
      function sync(rangeEl, numEl, setter) {
        rangeEl.addEventListener('input', () => { numEl.value = rangeEl.value; setter(+rangeEl.value); });
        numEl.addEventListener('input', () => { rangeEl.value = numEl.value; setter(+numEl.value); });
      }
      sync(document.getElementById('amplitude'), document.getElementById('amplitudeNum'), v => amplitude = v);
      sync(document.getElementById('wavelength'), document.getElementById('wavelengthNum'), v => wavelength = v);
      sync(document.getElementById('speed'), document.getElementById('speedNum'), v => speed = v);

      // Animation loop with robust update and error capture
      let lastTime = performance.now();
      function animate(now) {
        try {
          const dt = (now - lastTime) / 1000;
          lastTime = now;
          const timeFactor = now / 1000 * speed;

          // Update positions array directly
          const pos = wave.geometry.attributes.position.array;
          for (let i = 0; i < segments; i++) {
            const x = (i - segments/2) * 1.0;
            pos[i*3] = x;
            pos[i*3+1] = amplitude * Math.sin((x / wavelength) * Math.PI * 2 - timeFactor);
            pos[i*3+2] = 0;
          }
          wave.geometry.attributes.position.needsUpdate = true;

          if (controls && controls.update) controls.update();
          renderer.render(scene, camera);
          requestAnimationFrame(animate);
        } catch (err) {
          console.error('Animation error', err);
          logStatus('Animation error: ' + (err && err.message ? err.message : String(err)), true);
        }
      }
      requestAnimationFrame(animate);

      // Resize handling
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Final status
      document.getElementById('webglFlag').textContent = 'available and running';
      logStatus('Three.js renderer running. If you still see only the controls, check the Console for errors.');
    } catch (e) {
      console.error('Fatal initialization error', e);
      document.getElementById('webglFlag').textContent = 'initialization failed';
      logStatus('Initialization failed: ' + (e && e.message ? e.message : String(e)), true);
      // As a last resort, show a Canvas2D fallback
      const fallback = document.createElement('canvas');
      fallback.style.position = 'fixed';
      fallback.style.top = '0';
      fallback.style.left = '0';
      fallback.style.width = '100%';
      fallback.style.height = '100%';
      fallback.width = window.innerWidth;
      fallback.height = window.innerHeight;
      fallback.style.zIndex = '1';
      container.appendChild(fallback);
      const ctx = fallback.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.fillRect(0,0,fallback.width,fallback.height);
      ctx.fillStyle = '#FFD700';
      ctx.font = '20px sans-serif';
      ctx.fillText('Fallback: WebGL init failed. Check console for details.', 20, 40);
    }
  } // end webglAvailable branch
  </script>
</body>
</html>
