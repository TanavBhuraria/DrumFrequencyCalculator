<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>3D Wave Visualiser — Fixed Ribbon</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body { height:100%; margin:0; background:#000; color:#FFD700; font-family:Inter,system-ui,Arial,sans-serif; }
    #canvas-container { position:fixed; inset:0; z-index:1; }
    canvas { display:block; width:100%; height:100%; }

    .controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 40;
      background: rgba(0,0,0,0.78);
      border: 1px solid #FFD700;
      padding: 12px;
      border-radius: 8px;
      min-width: 320px;
      backdrop-filter: blur(4px);
    }
    .controls h3 { margin:0 0 8px 0; color:#FFD700; font-size:15px; }
    .row { display:flex; align-items:center; gap:8px; margin:6px 0; }
    label { font-size:13px; color:#FFD700; min-width:90px; }
    input[type=range] { flex:1; accent-color:#FFD700; }
    input[type=number] { width:84px; background:#111; color:#FFD700; border:1px solid #333; padding:4px 6px; border-radius:4px; }
    select, button { background:#111; color:#FFD700; border:1px solid #333; padding:6px 8px; border-radius:6px; cursor:pointer; }
    .small { font-size:12px; color:#ccc; margin-top:8px; }

    #zoomButtons { display:flex; gap:8px; margin-top:8px; }
    #status { position:absolute; right:12px; top:12px; z-index:40; background:rgba(0,0,0,0.8); color:#fff; padding:8px 10px; border-radius:6px; font-size:13px; border:1px solid rgba(255,215,0,0.12); max-width:320px; }
    .hint { position:absolute; left:12px; bottom:12px; z-index:40; color:#999; background:rgba(0,0,0,0.5); padding:8px; border-radius:6px; border:1px solid rgba(255,215,0,0.08); font-size:12px; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="controls" id="controls">
    <h3>3D Wave Visualiser</h3>

    <div class="row">
      <label>Amplitude</label>
      <input id="amplitude" type="range" min="10" max="300" step="1" value="100">
      <input id="amplitudeNum" type="number" min="10" max="300" step="1" value="100">
    </div>

    <div class="row">
      <label>Wavelength</label>
      <input id="wavelength" type="range" min="20" max="800" step="1" value="200">
      <input id="wavelengthNum" type="number" min="20" max="800" step="1" value="200">
    </div>

    <div class="row">
      <label>Depth (Z)</label>
      <input id="depth" type="range" min="0" max="400" step="1" value="40">
      <input id="depthNum" type="number" min="0" max="400" step="1" value="40">
    </div>

    <div class="row">
      <label>Speed</label>
      <input id="speed" type="range" min="0.1" max="20" step="0.1" value="5">
      <input id="speedNum" type="number" min="0.1" max="20" step="0.1" value="5">
    </div>

    <div class="row">
      <label>Segments</label>
      <input id="segments" type="range" min="200" max="4000" step="100" value="1600">
      <input id="segmentsNum" type="number" min="200" max="4000" step="100" value="1600">
    </div>

    <div class="row">
      <label>Render</label>
      <select id="mode">
        <option value="ribbon">3D Ribbon (Tube)</option>
        <option value="line">Fast Line</option>
      </select>
    </div>

    <div id="zoomButtons">
      <button id="zoomIn">Zoom In (+)</button>
      <button id="zoomOut">Zoom Out (-)</button>
      <button id="fitView">Fit View (0)</button>
    </div>

    <div class="small">Orbit: left-drag • Zoom: scroll or buttons • Pan: right-drag</div>
  </div>

  <div id="status">
    <div><strong>Status</strong></div>
    <div id="webglFlag">Checking WebGL…</div>
    <div id="errorMsg" style="margin-top:6px;"></div>
  </div>

  <div class="hint">Tip: press + / - to zoom, 0 to fit view.</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

  <script>
  // ===== Helpers =====
  function setStatus(text, isError=false) {
    document.getElementById('webglFlag').textContent = text;
    const em = document.getElementById('errorMsg');
    em.innerHTML = isError ? '<span style="color:#FF6B6B">' + text + '</span>' : '';
    console.log(text);
  }

  function checkWebGL() {
    try {
      const c = document.createElement('canvas');
      const gl = c.getContext('webgl2') || c.getContext('webgl') || c.getContext('experimental-webgl');
      return !!gl;
    } catch (e) { return false; }
  }

  const webgl = checkWebGL();
  if (!webgl) { setStatus('WebGL unavailable — try a modern browser or enable hardware acceleration', true); }
  else setStatus('WebGL available');

  // ===== Scene setup =====
  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 5000);
  camera.position.set(0, 160, 520);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.domElement.style.position = 'fixed';
  renderer.domElement.style.top = '0';
  renderer.domElement.style.left = '0';
  renderer.domElement.style.width = '100%';
  renderer.domElement.style.height = '100%';
  renderer.domElement.style.zIndex = '1';
  container.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.screenSpacePanning = false;
  controls.target.set(0,0,0);
  controls.update();

  // Lighting
  const ambient = new THREE.AmbientLight(0x404040, 1.2);
  scene.add(ambient);
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(0.5, 1, 0.5);
  scene.add(dir);

  // Axes
  const axisMat = new THREE.LineBasicMaterial({ color: 0xFFFFFF });
  function makeAxis(p1,p2){ return new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1,p2]), axisMat); }
  scene.add(makeAxis(new THREE.Vector3(-2000,0,0), new THREE.Vector3(2000,0,0)));
  scene.add(makeAxis(new THREE.Vector3(0,-1000,0), new THREE.Vector3(0,1000,0)));
  scene.add(makeAxis(new THREE.Vector3(0,0,-1000), new THREE.Vector3(0,0,1000)));

  // ===== UI & state =====
  const ui = {
    amplitude: document.getElementById('amplitude'),
    amplitudeNum: document.getElementById('amplitudeNum'),
    wavelength: document.getElementById('wavelength'),
    wavelengthNum: document.getElementById('wavelengthNum'),
    depth: document.getElementById('depth'),
    depthNum: document.getElementById('depthNum'),
    speed: document.getElementById('speed'),
    speedNum: document.getElementById('speedNum'),
    segments: document.getElementById('segments'),
    segmentsNum: document.getElementById('segmentsNum'),
    mode: document.getElementById('mode'),
    zoomIn: document.getElementById('zoomIn'),
    zoomOut: document.getElementById('zoomOut'),
    fitView: document.getElementById('fitView')
  };

  function sync(rangeEl, numEl, setter) {
    rangeEl.addEventListener('input', () => { numEl.value = rangeEl.value; setter(+rangeEl.value); });
    numEl.addEventListener('input', () => { rangeEl.value = numEl.value; setter(+numEl.value); });
  }

  let state = {
    amplitude: +ui.amplitude.value,
    wavelength: +ui.wavelength.value,
    depth: +ui.depth.value,
    speed: +ui.speed.value,
    segments: +ui.segments.value,
    mode: ui.mode.value
  };

  sync(ui.amplitude, ui.amplitudeNum, v => state.amplitude = v);
  sync(ui.wavelength, ui.wavelengthNum, v => state.wavelength = v);
  sync(ui.depth, ui.depthNum, v => state.depth = v);
  sync(ui.speed, ui.speedNum, v => state.speed = v);
  sync(ui.segments, ui.segmentsNum, v => state.segments = Math.max(200, Math.round(v/10)*10));

  ui.mode.addEventListener('change', () => { state.mode = ui.mode.value; scheduleRebuild(0); });

  // ===== Wave objects & materials =====
  let waveLine = null;
  let waveRibbon = null;
  let lastRibbonBuild = 0;
  const goldLineMat = new THREE.LineBasicMaterial({ color: 0xFFD700 });
  const goldMeshMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.25, side: THREE.DoubleSide });

  // Build fast line
  function buildLine(segments) {
    if (waveLine) { scene.remove(waveLine); waveLine.geometry.dispose(); waveLine = null; }
    const pos = new Float32Array(segments * 3);
    for (let i=0;i<segments;i++){
      const x = (i - segments/2) * 1.0;
      pos[i*3] = x;
      pos[i*3+1] = state.amplitude * Math.sin((x / state.wavelength) * Math.PI * 2);
      pos[i*3+2] = 0;
    }
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geom.setDrawRange(0, segments);
    waveLine = new THREE.Line(geom, goldLineMat);
    scene.add(waveLine);
  }

  // Build ribbon (Tube) — robust and uses DoubleSide material
  function buildRibbon(segments) {
    // Dispose previous safely
    if (waveRibbon) {
      try { scene.remove(waveRibbon); waveRibbon.geometry.dispose(); } catch(e){ console.warn('dispose ribbon', e); }
      waveRibbon = null;
    }
    const pts = [];
    for (let i=0;i<segments;i++){
      const x = (i - segments/2) * 1.0;
      const y = state.amplitude * Math.sin((x / state.wavelength) * Math.PI * 2);
      const z = state.depth * Math.sin((x / Math.max(1, state.wavelength*0.5)) * Math.PI * 2);
      pts.push(new THREE.Vector3(x,y,z));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    const tubularSegments = Math.max(64, Math.floor(segments / 8));
    const radius = Math.max(0.6, Math.min(6, state.wavelength / 200));
    const geometry = new THREE.TubeGeometry(curve, tubularSegments, radius, 8, false);
    // Ensure geometry has normals for lighting
    geometry.computeVertexNormals();
    waveRibbon = new THREE.Mesh(geometry, goldMeshMat);
    waveRibbon.frustumCulled = false; // avoid accidental frustum culling when camera is close
    scene.add(waveRibbon);
    lastRibbonBuild = performance.now();
  }

  function rebuildWave() {
    if (state.mode === 'line') {
      if (waveRibbon) { try { scene.remove(waveRibbon); waveRibbon.geometry.dispose(); } catch(e){} waveRibbon = null; }
      buildLine(state.segments);
    } else {
      if (waveLine) { try { scene.remove(waveLine); waveLine.geometry.dispose(); } catch(e){} waveLine = null; }
      buildRibbon(state.segments);
    }
  }

  // initial build
  rebuildWave();

  // ===== Animation loop (robust) =====
  function animate(now) {
    const t = now || 0;
    const timeFactor = (t / 1000) * state.speed;

    if (state.mode === 'line' && waveLine) {
      const pos = waveLine.geometry.attributes.position.array;
      const segments = state.segments;
      for (let i=0;i<segments;i++){
        const x = (i - segments/2) * 1.0;
        pos[i*3] = x;
        pos[i*3+1] = state.amplitude * Math.sin((x / state.wavelength) * Math.PI * 2 - timeFactor);
        pos[i*3+2] = state.depth * Math.sin((x / Math.max(1, state.wavelength*0.5)) * Math.PI * 2 - timeFactor*0.5);
      }
      waveLine.geometry.attributes.position.needsUpdate = true;
    }

    if (state.mode === 'ribbon') {
      // Rebuild ribbon at most once per 400ms to avoid flicker and heavy work
      const nowMs = performance.now();
      if (!waveRibbon || (nowMs - lastRibbonBuild > 400 && (state.segments !== undefined))) {
        // Rebuild ribbon safely
        try { buildRibbon(state.segments); } catch (e) { console.error('Ribbon build failed', e); setStatus('Ribbon build failed: ' + e.message, true); }
      } else if (waveRibbon) {
        // subtle rotation for life
        waveRibbon.rotation.y = Math.sin(timeFactor * 0.2) * 0.06;
      }
    }

    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  // ===== Zoom controls (smooth dolly) =====
  function dolly(delta) {
    const dir = new THREE.Vector3();
    dir.subVectors(camera.position, controls.target).normalize();
    const distance = camera.position.distanceTo(controls.target);
    const minDist = 20;
    const maxDist = 3000;
    let newDist = THREE.MathUtils.clamp(distance - delta, minDist, maxDist);
    const newPos = new THREE.Vector3();
    newPos.copy(controls.target).add(dir.multiplyScalar(newDist));
    const start = camera.position.clone();
    const duration = 220;
    const startTime = performance.now();
    function step() {
      const now = performance.now();
      const p = Math.min(1, (now - startTime) / duration);
      const ease = p * (2 - p);
      camera.position.lerpVectors(start, newPos, ease);
      camera.updateProjectionMatrix();
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  ui.zoomIn.addEventListener('click', () => dolly(80));
  ui.zoomOut.addEventListener('click', () => dolly(-80));
  ui.fitView.addEventListener('click', fitView);

  window.addEventListener('keydown', (e) => {
    if (e.key === '+' || e.key === '=') { dolly(80); }
    if (e.key === '-' || e.key === '_') { dolly(-80); }
    if (e.key === '0') { fitView(); }
  });

  function fitView() {
    const half = state.segments / 2;
    const minX = -half, maxX = half;
    const maxAmp = Math.abs(state.amplitude) + Math.abs(state.depth);
    const center = new THREE.Vector3((minX + maxX)/2, 0, 0);
    controls.target.copy(center);
    const fov = camera.fov * (Math.PI/180);
    const width = Math.max((maxX - minX) * 0.6, maxAmp * 2.2);
    const distance = Math.abs(width / Math.tan(fov/2));
    const newPos = new THREE.Vector3(center.x, center.y + distance*0.25, center.z + distance*0.9);
    const start = camera.position.clone();
    const startTarget = controls.target.clone();
    const duration = 420;
    const startTime = performance.now();
    function step() {
      const now = performance.now();
      const p = Math.min(1, (now - startTime) / duration);
      const ease = p * (2 - p);
      camera.position.lerpVectors(start, newPos, ease);
      controls.target.lerpVectors(startTarget, center, ease);
      camera.updateProjectionMatrix();
      controls.update();
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // ===== Rebuild scheduling =====
  let rebuildTimeout = null;
  function scheduleRebuild() {
    if (rebuildTimeout) clearTimeout(rebuildTimeout);
    rebuildTimeout = setTimeout(() => { rebuildWave(); }, 180);
  }
  function scheduleRebuildImmediate() {
    if (rebuildTimeout) clearTimeout(rebuildTimeout);
    rebuildWave();
  }

  ['amplitude','wavelength','depth','segments','mode'].forEach(k => {
    const el = document.getElementById(k);
    if (el) el.addEventListener('input', () => {
      state[k] = (k === 'segments') ? Math.max(200, Math.round(+el.value/10)*10) : +el.value;
      // segments and mode are heavier — rebuild immediately; others schedule
      if (k === 'segments' || k === 'mode') scheduleRebuildImmediate();
      else scheduleRebuild();
    });
  });

  // ===== Resize handling =====
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Final status
  setStatus('Running — ribbon rebuild fixed. If you still see nothing, open DevTools Console and paste the first red error here.');
  </script>
</body>
</html>
