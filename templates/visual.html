<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Wave Visualiser</title>
  <style>
    body { margin:0; background:black; color:gold; font-family:sans-serif; overflow:hidden; }
    .controls {
      position:absolute; top:10px; left:10px;
      background:rgba(0,0,0,0.7); padding:10px;
      border:1px solid gold; border-radius:5px;
    }
    label { display:block; margin:5px 0; }
    input[type=range], input[type=number] { accent-color:gold; margin-left:5px; }
  </style>
</head>
<body>
  <div class="controls">
    <label>Amplitude:
      <input type="range" id="amplitude" min="20" max="200" value="100" step="1">
      <input type="number" id="amplitudeNum" min="20" max="200" value="100" step="1">
    </label>
    <label>Wavelength:
      <input type="range" id="wavelength" min="50" max="500" value="200" step="1">
      <input type="number" id="wavelengthNum" min="50" max="500" value="200" step="1">
    </label>
    <label>Speed:
      <input type="range" id="speed" min="1" max="10" value="5" step="0.1">
      <input type="number" id="speedNum" min="1" max="10" value="5" step="0.1">
    </label>
    <label>Time Period:
      <input type="range" id="period" min="1" max="10" value="5" step="0.1">
      <input type="number" id="periodNum" min="1" max="10" value="5" step="0.1">
    </label>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
    camera.position.set(0, 100, 400);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    // Parameters
    let amplitude = 100, wavelength = 200, speed = 5, period = 5;

    // Create wave geometry
    const segments = 2000;
    const positions = new Float32Array(segments * 3);
    for (let i = 0; i < segments; i++) {
      const x = i - segments/2;
      positions[i*3] = x;
      positions[i*3+1] = amplitude * Math.sin((x / wavelength) * 2 * Math.PI);
      positions[i*3+2] = 0;
    }
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.LineBasicMaterial({ color: 0xFFD700, linewidth: 3 });
    const wave = new THREE.Line(geometry, material);
    scene.add(wave);

    // White axes
    const axisMaterial = new THREE.LineBasicMaterial({ color: 0xFFFFFF, linewidth: 2 });

    // X-axis
    const xAxisPoints = [new THREE.Vector3(-1000, 0, 0), new THREE.Vector3(1000, 0, 0)];
    const xAxisGeometry = new THREE.BufferGeometry().setFromPoints(xAxisPoints);
    const xAxis = new THREE.Line(xAxisGeometry, axisMaterial);
    scene.add(xAxis);

    // Y-axis
    const yAxisPoints = [new THREE.Vector3(0, -500, 0), new THREE.Vector3(0, 500, 0)];
    const yAxisGeometry = new THREE.BufferGeometry().setFromPoints(yAxisPoints);
    const yAxis = new THREE.Line(yAxisGeometry, axisMaterial);
    scene.add(yAxis);

    // Z-axis
    const zAxisPoints = [new THREE.Vector3(0, 0, -500), new THREE.Vector3(0, 0, 500)];
    const zAxisGeometry = new THREE.BufferGeometry().setFromPoints(zAxisPoints);
    const zAxis = new THREE.Line(zAxisGeometry, axisMaterial);
    scene.add(zAxis);

    // Sync sliders and numbers
    function syncInputs(rangeId, numId, variable) {
      const range = document.getElementById(rangeId);
      const num = document.getElementById(numId);
      range.oninput = () => { num.value = range.value; window[variable] = parseFloat(range.value); };
      num.oninput = () => { range.value = num.value; window[variable] = parseFloat(num.value); };
    }
    syncInputs("amplitude","amplitudeNum","amplitude");
    syncInputs("wavelength","wavelengthNum","wavelength");
    syncInputs("speed","speedNum","speed");
    syncInputs("period","periodNum","period");

    // Animate wave
    function animate(time) {
      const pos = wave.geometry.attributes.position.array;
      for (let i = 0; i < segments; i++) {
        const x = i - segments/2;
        pos[i*3] = x;
        pos[i*3+1] = amplitude * Math.sin((x / wavelength) * 2 * Math.PI - time/1000 * speed);
        pos[i*3+2] = 0;
      }
      wave.geometry.attributes.position.needsUpdate = true;

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate(0);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
