<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drum Wave Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #f5f5f5;
    }

    /* Hero section */
    header {
      background: linear-gradient(135deg, #000000, #2a2a2a);
      text-align: center;
      padding: 80px 20px;
      position: relative;
    }
    header h1 {
      font-size: 3rem;
      margin: 0;
      color: #ffd700; /* gold accent */
      text-shadow: 0 0 12px rgba(255,215,0,0.6);
    }
    header p {
      font-size: 1.2rem;
      margin-top: 15px;
      color: #ccc;
    }

    /* Drum image background accent */
    header::after {
      content: "";
      background: url("{{ url_for('static', filename='drum.png') }}") no-repeat center;
      background-size: 300px;
      opacity: 0.15;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    header h1, header p {
      position: relative;
      z-index: 1;
    }

    /* Button container */
    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 40px auto;
      max-width: 800px;
    }

    .btn {
      flex: 1 1 200px;
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      background: #1a1a1a;
      color: #ffd700;
      font-size: 1.2rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 6px 16px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 24px rgba(255,215,0,0.3);
    }
  </style>
</head>
<body>
  <header>
    <h1>Drum Wave Simulator</h1>
    <p>Explore the physics, resonance, and beauty of vibrating drum membranes</p>
  </header>

  <div class="buttons">
    <a href="{{ url_for('calculator') }}" class="btn">Calculator</a>
    <a href="{{ url_for('howitworks') }}" class="btn">How It Works</a>
    <a href="{{ url_for('index') }}" class="btn">Home</a>
  </div>
</body>
</html>
