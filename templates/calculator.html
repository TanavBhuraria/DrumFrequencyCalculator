<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drum Wave Simulator | Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #f5f5f5;
    }

    /* Hero section */
    header {
      background: linear-gradient(135deg, #000000, #2a2a2a);
      text-align: center;
      padding: 80px 20px;
      position: relative;
    }
    header h1 {
      font-size: 2.6rem;
      margin: 0;
      color: #ffd700;
      text-shadow: 0 0 12px rgba(255,215,0,0.6);
    }
    header p {
      font-size: 1.1rem;
      margin-top: 15px;
      color: #ccc;
    }

    /* Content card */
    .content {
      max-width: 600px;
      margin: -30px auto 40px auto;
      background: #161b22;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }

    label {
      display: block;
      margin: 20px 0 8px;
      font-weight: 600;
      color: #ffd700;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #2a2a3d;
      background: #1f2937;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 8px rgba(255,215,0,0.6);
    }

    small {
      display: block;
      margin-top: 6px;
      font-size: 0.85rem;
      color: #aaa;
    }

    /* Button styling */
    .btn {
      width: 100%;
      padding: 16px;
      margin-top: 30px;
      border: none;
      border-radius: 12px;
      background: #1a1a1a;
      color: #ffd700;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 24px rgba(255,215,0,0.3);
    }

    /* Result card */
    .result {
      margin-top: 30px;
      padding: 20px;
      background: #1e293b;
      border-radius: 12px;
      font-size: 1.4rem;
      font-weight: 600;
      color: #ffd700;
      text-align: center;
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <header>
    <h1>Drum Wave Simulator</h1>
    <p>Calculate resonance frequencies with precision</p>
  </header>

  <div class="content">
    <form method="post">
      <label for="radius">Radius (cm):</label>
      <input type="number" name="radius" step="0.01" required>
      <small>⚠️ Best results: radius between 5 and 50 cm</small>

      <label for="tension">Tension:</label>
      <select name="tension">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <label for="thickness">Thickness:</label>
      <select name="thickness">
        <option>Thin</option>
        <option>Medium</option>
        <option>Thick</option>
      </select>

      <button type="submit" class="btn">Calculate Frequency</button>
    </form>

    {% if freq %}
      <div class="result">Estimated Frequency: {{ freq }} Hz</div>
    {% endif %}
  </div>
</body>
</html>
