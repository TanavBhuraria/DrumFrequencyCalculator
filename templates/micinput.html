<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Drum Calibrator — Expanded Frequency Output</title>
<style>
  :root{
    --bg:#071029; --card:#071a2b; --accent:#f59e0b; --muted:#94a3b8; --btn:#06b6d4;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:Inter,Segoe UI,Arial,sans-serif}
  .wrap{max-width:1200px;margin:18px auto;padding:18px}
  .card{background:var(--card);padding:20px;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,0.5)}
  h1{color:var(--accent);margin:0 0 12px 0}
  .controls{display:flex;flex-wrap:wrap;gap:8px}
  button{background:var(--btn);border:none;padding:10px 14px;border-radius:8px;color:#012;font-weight:800;cursor:pointer}
  button.alt{background:#0ea5a1}
  .display{margin-top:14px;padding:16px;border-radius:10px;background:rgba(0,0,0,0.12)}
  .big{font-size:2.4rem;font-weight:900;color:var(--accent);min-height:56px;text-align:center}
  .muted{color:var(--muted)}
  .counts{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
  .count{background:#041427;padding:8px;border-radius:8px;min-width:140px;text-align:center}
  .debug{margin-top:12px;background:#031022;padding:12px;border-radius:8px;font-family:monospace;white-space:pre-wrap;color:#cbd5e1}
  label.small{color:var(--muted)}
  input[type=number]{width:74px;padding:6px;border-radius:6px;border:none}
  footer{color:var(--muted);margin-top:12px}
  @media (max-width:720px){ .big{font-size:1.6rem} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Drum Calibrator — Expanded Frequency Output</h1>

      <div class="controls">
        <button id="startBtn">Start Audio</button>

        <button id="calSnare">Calibrate Snare (1)</button>
        <button id="calKick">Calibrate Kick (2)</button>
        <button id="calLow">Calibrate Low Tom (3)</button>
        <button id="calMid">Calibrate Mid Tom (4)</button>
        <button id="calHigh">Calibrate High Tom (5)</button>

        <label class="small">Samples per class: <input id="samplesInput" type="number" value="12" min="3" max="50"></label>
        <button id="trainBtn" class="alt">Train</button>

        <label class="small">k (k-NN): <input id="kInput" type="number" value="3" min="1" max="11"></label>
        <button id="liveBtn" class="alt">Live</button>

        <button id="resetBtn">Reset Cal</button>
        <button id="exportBtn">Export Cal</button>
        <button id="importBtn">Import Cal</button>
        <input id="importFile" type="file" accept=".json" style="display:none" />
      </div>

      <div class="display">
        <div class="big" id="bigDisplay">idle</div>
        <div class="muted" id="status">Status: audio stopped. Press Start Audio.</div>
        <div class="counts" id="countsRow">
          <div class="count"><strong>Snare (1)</strong><div id="c1">0</div></div>
          <div class="count"><strong>Kick (2)</strong><div id="c2">0</div></div>
          <div class="count"><strong>Low Tom (3)</strong><div id="c3">0</div></div>
          <div class="count"><strong>Mid Tom (4)</strong><div id="c4">0</div></div>
          <div class="count"><strong>High Tom (5)</strong><div id="c5">0</div></div>
          <div class="count"><strong>Classifier</strong><div id="clf">untrained</div></div>
        </div>
      </div>

      <div class="debug" id="debug">debug: ready</div>
      <footer>Benchmarks: Snare=180Hz, HighTom=150Hz, MidTom=130Hz, LowTom=90Hz, Kick=60Hz</footer>
    </div>
  </div>

<script>
/*
  Expanded Drum Calibrator — large/verbose version.
  - 5 classes: 1=Snare,2=Kick,3=LowTom,4=MidTom,5=HighTom
  - Display only frequency (benchmark) for predicted class.
  - k-NN classifier, calibration, export/import.
  - Lots of helpers, many small functions (explicit, verbose) for clarity and length.
*/

/* ========== Configuration (explicit constants) ========== */

/* Benchmark frequencies used as UI output */
const BENCHMARK_FREQ = {
  1: 180, // Snare
  2: 60,  // Kick
  3: 90,  // Low Tom
  4: 130, // Mid Tom
  5: 150  // High Tom
};

/* Audio / analysis parameters */
const DEFAULT_SAMPLES = 12;
const DEFAULT_K = 3;
const PROCESSOR_SIZE = 2048;
const ANALYZER_FFT = 16384;
const RING_SECONDS = 1.0;
const DISPLAY_SMOOTH = 3;

/* Hit detection parameters */
const INITIAL_NOISE_EMA = 0.0016;
const EMA_ALPHA = 0.02;
const MIN_MEAN_ABS = 0.00003;
const HIT_MULTIPLIER = 1.4;
const PEAK_MIN = 0.02;
const PEAK_MULT = 3.5;
const HIT_DEBOUNCE_MS = 100;
const CAL_COOLDOWN_MS = 500;

/* ========== UI references ========== */
const startBtn = document.getElementById('startBtn');
const calSnareBtn = document.getElementById('calSnare');
const calKickBtn = document.getElementById('calKick');
const calLowBtn = document.getElementById('calLow');
const calMidBtn = document.getElementById('calMid');
const calHighBtn = document.getElementById('calHigh');

const samplesInput = document.getElementById('samplesInput');
const kInput = document.getElementById('kInput');
const trainBtn = document.getElementById('trainBtn');
const liveBtn = document.getElementById('liveBtn');
const resetBtn = document.getElementById('resetBtn');
const exportBtn = document.getElementById('exportBtn');
const importBtn = document.getElementById('importBtn');
const importFile = document.getElementById('importFile');

const bigDisplay = document.getElementById('bigDisplay');
const statusEl = document.getElementById('status');
const debugEl = document.getElementById('debug');

const countEls = {
  1: document.getElementById('c1'),
  2: document.getElementById('c2'),
  3: document.getElementById('c3'),
  4: document.getElementById('c4'),
  5: document.getElementById('c5')
};
const clfEl = document.getElementById('clf');

/* ========== Runtime state ========== */
let audioCtx = null;
let analyser = null;
let scriptNode = null;
let micSource = null;
let sampleRate = 44100;

let ringBuffer = null;
let ringLen = 0;
let ringWrite = 0;

let noiseEMA = INITIAL_NOISE_EMA;
let lastHit = 0;
let lastCalRecord = 0;

let isRunning = false;
let mode = 'idle'; // 'idle', 'calibrate', 'train', 'live'
let calibratingClass = null;

let samplesPerClass = DEFAULT_SAMPLES;
let knnK = DEFAULT_K;

/* Storage for calibration samples (raw features) */
const rawSamples = {1:[],2:[],3:[],4:[],5:[]};
let normalizedSamples = {1:[],2:[],3:[],4:[],5:[]};
let featureMeans = null;
let featureStds = null;

/* Display smoothing buffer */
const displayBuf = [];

/* =========================
   Initialization & Wiring
   ========================= */

/* Read inputs changes */
samplesInput.addEventListener('change', () => {
  const v = parseInt(samplesInput.value, 10);
  samplesPerClass = Number.isFinite(v) ? v : DEFAULT_SAMPLES;
});
kInput.addEventListener('change', () => {
  const v = parseInt(kInput.value, 10);
  knnK = Number.isFinite(v) ? Math.max(1, v) : DEFAULT_K;
});

/* Wire buttons with verbose wrapper functions */
startBtn.addEventListener('click', () => { if (isRunning) stopEverything(); else startEverything(); });
calSnareBtn.addEventListener('click', () => startCalibration(1));
calKickBtn.addEventListener('click', () => startCalibration(2));
calLowBtn.addEventListener('click', () => startCalibration(3));
calMidBtn.addEventListener('click', () => startCalibration(4));
calHighBtn.addEventListener('click', () => startCalibration(5));
trainBtn.addEventListener('click', () => trainClassifier());
liveBtn.addEventListener('click', () => activateLive());
resetBtn.addEventListener('click', () => resetCalibration());
exportBtn.addEventListener('click', () => exportCalibration());
importBtn.addEventListener('click', () => importFile.click());
importFile.addEventListener('change', (e) => importCalibrationFile(e));

/* Periodic UI refresh */
setInterval(updateCountsUI, 300);

/* Initial debug text */
debugLog('Ready. Press Start Audio.');

/* =========================
   Audio start/stop wrappers
   ========================= */

async function startEverything() {
  try {
    await startAudio();
    statusEl.textContent = 'Audio started. Calibrate each class.';
    startBtn.textContent = 'Stop Audio';
  } catch (err) {
    console.error(err);
    alert('Microphone access required: ' + (err && err.message ? err.message : err));
  }
}

function stopEverything() {
  stopAudio();
  statusEl.textContent = 'Audio stopped.';
  startBtn.textContent = 'Start Audio';
  bigDisplay.textContent = 'idle';
}

/* =========================
   Start / Stop Audio
   ========================= */

async function startAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  sampleRate = audioCtx.sampleRate;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = Math.min(ANALYZER_FFT, 32768);
  analyser.smoothingTimeConstant = 0.0;

  scriptNode = audioCtx.createScriptProcessor(PROCESSOR_SIZE, 1, 1);
  scriptNode.onaudioprocess = onAudioProcess;

  const stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      channelCount: 1,
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    }
  });

  micSource = audioCtx.createMediaStreamSource(stream);
  micSource.connect(analyser);
  micSource.connect(scriptNode);
  scriptNode.connect(audioCtx.destination);

  ringLen = Math.ceil(RING_SECONDS * sampleRate);
  ringBuffer = new Float32Array(ringLen);
  ringWrite = 0;

  noiseEMA = INITIAL_NOISE_EMA;
  lastHit = 0;
  lastCalRecord = 0;

  isRunning = true;
  mode = 'idle';
  debugLog('Audio started — sampleRate=' + sampleRate + ' Hz, analyser.fftSize=' + analyser.fftSize);
}

/* Stop and cleanup */
function stopAudio() {
  if (!isRunning) return;
  try { if (micSource && micSource.mediaStream) micSource.mediaStream.getTracks().forEach(t => t.stop()); } catch (e) {}
  try { scriptNode.disconnect(); analyser.disconnect(); audioCtx.close(); } catch (e) {}
  micSource = null;
  analyser = null;
  scriptNode = null;
  audioCtx = null;
  isRunning = false;
  mode = 'idle';
  debugLog('Audio stopped and cleaned up.');
}

/* =========================
   Audio processing / hit detect
   ========================= */

function onAudioProcess(ev) {
  if (!isRunning) return;
  const input = ev.inputBuffer.getChannelData(0);
  writeRing(input);
  const { meanAbs, peak } = computeBlockStats(input);
  updateNoiseEMA(meanAbs);

  const meanThr = Math.max(MIN_MEAN_ABS, noiseEMA * HIT_MULTIPLIER);
  const peakThr = Math.max(PEAK_MIN, noiseEMA * PEAK_MULT);

  const now = performance.now();
  if ((meanAbs >= meanThr || peak >= peakThr) && (now - lastHit) > HIT_DEBOUNCE_MS) {
    lastHit = now;
    handleHitDetected();
  }
}

/* Write block into ring buffer */
function writeRing(block) {
  for (let i = 0; i < block.length; i++) {
    ringBuffer[ringWrite++] = block[i];
    if (ringWrite >= ringLen) ringWrite = 0;
  }
}

/* Compute quick stats for gating */
function computeBlockStats(buf) {
  let sumAbs = 0, peak = 0;
  for (let i = 0; i < buf.length; i++) {
    const v = Math.abs(buf[i]);
    sumAbs += v;
    if (v > peak) peak = v;
  }
  const meanAbs = sumAbs / buf.length;
  return { meanAbs, peak };
}

/* Update noise EMA */
function updateNoiseEMA(meanAbs) {
  noiseEMA = noiseEMA * (1 - EMA_ALPHA) + meanAbs * EMA_ALPHA;
}

/* =========================
   Hit handling (capture & process)
   ========================= */

function handleHitDetected() {
  // capture audio window and extract features
  const capture = captureLatest(RING_SECONDS * 0.6);
  const feats = extractFeatures(capture);

  // calibration logic
  if (mode === 'calibrate' && calibratingClass) {
    const now = performance.now();
    if (now - lastCalRecord >= CAL_COOLDOWN_MS) {
      rawSamples[calibratingClass].push(feats);
      lastCalRecord = now;
      updateCountsUI();
      statusEl.textContent = `Calibrating ${labelName(calibratingClass)}: ${rawSamples[calibratingClass].length}/${samplesPerClass}`;
      if (rawSamples[calibratingClass].length >= samplesPerClass) {
        calibratingClass = null;
        mode = 'idle';
        statusEl.textContent = 'Class calibrated. Train when all classes done.';
      }
    } else {
      // too close to previous calibration hit: ignored (debounced)
      debugLog('Calibration hit ignored due to cooldown');
    }
    return;
  }

  // live classification path
  if (mode === 'live' && featureMeans) {
    const vec = vectorizeAndNormalize(feats);
    const out = classifyKNN(vec, knnK);
    displayFrequencyForClass(out.pred);
    debugUpdate(feats, vec, out.pred, out.conf, out.dists);
    return;
  }

  // fallback when not trained: use heuristic
  const heuristicClass = heuristicLabel(feats);
  displayFrequencyForClass(heuristicClass);
  debugUpdate(feats, null, heuristicClass, 0, []);
}

/* Capture last duration seconds from ring buffer into new Float32Array */
function captureLatest(seconds) {
  const len = Math.min(ringLen, Math.floor(seconds * sampleRate));
  const out = new Float32Array(len);
  let start = (ringWrite - len + ringLen) % ringLen;
  if (start + len <= ringLen) {
    out.set(ringBuffer.subarray(start, start + len), 0);
  } else {
    const tail = ringLen - start;
    out.set(ringBuffer.subarray(start, ringLen), 0);
    out.set(ringBuffer.subarray(0, len - tail), tail);
  }
  return out;
}

/* =========================
   Feature extraction (broken into many helpers)
   ========================= */

/* High-level extractor that uses many small helpers */
function extractFeatures(timeBuf) {
  const spectrum = getSpectrumByteArray();
  const binHz = sampleRate / analyser.fftSize;

  const specStats = computeSpectrumStats(spectrum, binHz);
  const bandEnergies = computeBandEnergies(spectrum, binHz);
  const flatness = computeSpectralFlatness(spectrum);
  const rolloff = computeRolloff(spectrum, binHz, 0.85);

  const tdStats = computeTimeDomainStats(timeBuf);
  const attackMs = computeAttackTime(timeBuf, tdStats.peak);
  const decayRatio = computeDecayRatio(timeBuf);
  const acStrength = computeAutocorrelationStrength(timeBuf);

  return {
    centroid: specStats.centroid,
    peakFreq: specStats.peakFreq,
    lowR: bandEnergies.lowR,
    midR: bandEnergies.midR,
    highR: bandEnergies.highR,
    flatness: flatness,
    rollF: rolloff,
    rms: tdStats.rms,
    peakToRms: tdStats.peakToRms,
    zcr: tdStats.zcr,
    attackMs: attackMs,
    decayRatio: decayRatio,
    acStrength: acStrength
  };
}

/* Read analyser frequency data into Uint8Array */
function getSpectrumByteArray() {
  const len = analyser.frequencyBinCount;
  const arr = new Uint8Array(len);
  analyser.getByteFrequencyData(arr);
  return arr;
}

/* Compute centroid, peak bin and peak frequency */
function computeSpectrumStats(spectrum, binHz) {
  let sumMag = 0, weighted = 0, maxMag = 0, maxBin = 0;
  for (let i = 1; i < spectrum.length; i++) {
    const m = Math.max(0, spectrum[i]);
    const f = i * binHz;
    sumMag += m;
    weighted += m * f;
    if (m > maxMag) { maxMag = m; maxBin = i; }
  }
  const centroid = sumMag > 0 ? (weighted / sumMag) : 0;
  const peakFreq = maxBin * binHz;
  return { centroid, peakFreq, maxMag };
}

/* Compute band energies low/mid/high ranges and return normalized ratios */
function computeBandEnergies(spectrum, binHz) {
  const lowRange = [20, 160], midRange = [160, 900], highRange = [900, sampleRate / 2];
  let El = 0, Em = 0, Eh = 0;
  for (let i = 1; i < spectrum.length; i++) {
    const f = i * binHz;
    const m = spectrum[i];
    if (f >= lowRange[0] && f <= lowRange[1]) El += m;
    else if (f > midRange[0] && f <= midRange[1]) Em += m;
    else if (f > highRange[0] && f <= highRange[1]) Eh += m;
  }
  const total = Math.max(1, El + Em + Eh);
  return { lowR: El / total, midR: Em / total, highR: Eh / total };
}

/* Spectral flatness (approx) */
function computeSpectralFlatness(spectrum) {
  let logSum = 0, nz = 0, arith = 0;
  for (let i = 1; i < spectrum.length; i++) {
    const v = Math.max(1, spectrum[i]);
    logSum += Math.log(v);
    arith += spectrum[i];
    nz++;
  }
  const geoMean = Math.exp(logSum / Math.max(1, nz));
  const arithMean = arith / Math.max(1, nz);
  return arithMean > 0 ? (geoMean / arithMean) : 0;
}

/* Compute rolloff frequency at given percentile (e.g., 0.85) */
function computeRolloff(spectrum, binHz, percentile = 0.85) {
  let acc = 0;
  let total = 0;
  for (let i = 1; i < spectrum.length; i++) total += spectrum[i];
  total = Math.max(1, total);
  for (let i = 1; i < spectrum.length; i++) {
    acc += spectrum[i];
    if (acc >= total * percentile) return i * binHz;
  }
  return 0;
}

/* =========================
   Time-domain helpers
   ========================= */

function computeTimeDomainStats(buf) {
  const N = buf.length;
  let sumSq = 0, peak = 0, zeroCross = 0;
  for (let i = 0; i < N; i++) {
    const v = buf[i];
    sumSq += v * v;
    const av = Math.abs(v);
    if (av > peak) peak = av;
    if (i > 0) {
      if ((buf[i - 1] >= 0 && buf[i] < 0) || (buf[i - 1] < 0 && buf[i] >= 0)) zeroCross++;
    }
  }
  const rms = Math.sqrt(sumSq / Math.max(1, N));
  const peakToRms = peak / Math.max(1e-8, rms);
  const zcr = zeroCross / Math.max(1, N);
  return { rms, peak, peakToRms, zcr };
}

function computeAttackTime(buf, peak) {
  const N = buf.length;
  const attackWindow = Math.min(N, Math.floor(0.15 * sampleRate));
  for (let i = 0; i < attackWindow; i++) {
    if (Math.abs(buf[i]) >= 0.85 * peak) {
      return (i / sampleRate) * 1000;
    }
  }
  return (attackWindow / sampleRate) * 1000;
}

function computeDecayRatio(buf) {
  const N = buf.length;
  const earlyN = Math.min(N, Math.floor(0.1 * sampleRate));
  const lateN = Math.min(N, Math.floor(0.45 * sampleRate));
  let eEarly = 0, eLate = 0;
  for (let i = 0; i < earlyN; i++) eEarly += buf[i] * buf[i];
  for (let i = earlyN; i < lateN; i++) eLate += buf[i] * buf[i];
  return (eEarly + 1e-9) / (eLate + 1e-9);
}

/* Autocorrelation strength (downsampled) */
function computeAutocorrelationStrength(buf) {
  const ds = downsample(buf, sampleRate, 8000);
  const dsN = ds.length;
  if (dsN < 4) return 0;
  let acBest = 0;
  const minLag = Math.max(2, Math.floor(8000 / 400));
  const maxLag = Math.min(dsN - 2, Math.floor(8000 / 20));
  for (let lag = minLag; lag <= maxLag; lag++) {
    let s = 0;
    for (let i = 0; i < dsN - lag; i++) s += ds[i] * ds[i + lag];
    if (s > acBest) acBest = s;
  }
  return acBest / Math.max(1e-8, dsN);
}

function downsample(buf, origRate, targetRate) {
  if (targetRate >= origRate) return buf.slice();
  const ratio = origRate / targetRate;
  const outLen = Math.floor(buf.length / ratio);
  const out = new Float32Array(Math.max(1, outLen));
  for (let i = 0; i < out.length; i++) {
    const s = Math.floor(i * ratio), e = Math.floor((i + 1) * ratio);
    let sum = 0, c = 0;
    for (let j = s; j < e && j < buf.length; j++) { sum += buf[j]; c++; }
    out[i] = c > 0 ? sum / c : 0;
  }
  return out;
}

/* =========================
   Feature vector helpers
   ========================= */

function objToArray(o) {
  return [
    o.centroid || 0,
    o.peakFreq || 0,
    o.lowR || 0,
    o.midR || 0,
    o.highR || 0,
    o.flatness || 0,
    o.rollF || 0,
    o.rms || 0,
    o.peakToRms || 0,
    o.zcr || 0,
    o.attackMs || 0,
    o.decayRatio || 0,
    o.acStrength || 0
  ];
}

function vectorizeAndNormalize(feats) {
  const arr = objToArray(feats);
  if (!featureMeans) return arr;
  const norm = new Array(arr.length);
  for (let i = 0; i < arr.length; i++) {
    norm[i] = (arr[i] - featureMeans[i]) / featureStds[i];
  }
  return norm;
}

/* =========================
   Normalization & training
   ========================= */

function computeNormalization() {
  const all = [];
  for (const id of [1,2,3,4,5]) {
    for (const s of rawSamples[id]) all.push(objToArray(s));
  }
  const n = all.length;
  if (n === 0) return;
  const dim = all[0].length;
  featureMeans = new Array(dim).fill(0);
  featureStds = new Array(dim).fill(0);
  // compute means
  for (let j = 0; j < dim; j++) {
    let sum = 0;
    for (let i = 0; i < n; i++) sum += all[i][j];
    featureMeans[j] = sum / n;
  }
  // compute stds
  for (let j = 0; j < dim; j++) {
    let s = 0;
    for (let i = 0; i < n; i++) { const d = all[i][j] - featureMeans[j]; s += d * d; }
    featureStds[j] = Math.sqrt(s / Math.max(1, n - 1)) || 1e-6;
  }
  // build normalized samples per class
  normalizedSamples = {1:[],2:[],3:[],4:[],5:[]};
  for (const id of [1,2,3,4,5]) {
    for (const s of rawSamples[id]) {
      const arr = objToArray(s);
      const norm = arr.map((v, i) => (v - featureMeans[i]) / featureStds[i]);
      normalizedSamples[id].push(norm);
    }
  }
  debugLog('Normalization computed; feature dim=' + featureMeans.length);
}

/* =========================
   k-NN classifier (explicit)
   ========================= */

function classifyKNN(vec, k) {
  if (!featureMeans) return { pred: heuristicLabelObj(vec), conf: 0, dists: [] };
  // build pool
  const pool = [];
  for (const id of [1,2,3,4,5]) {
    for (const v of normalizedSamples[id]) pool.push({ v: v, label: id });
  }
  // compute distances
  const dists = pool.map(p => {
    let s = 0;
    for (let i = 0; i < p.v.length; i++) {
      const d = vec[i] - p.v[i];
      s += d * d;
    }
    return { label: p.label, dist: Math.sqrt(s) };
  });
  dists.sort((a,b) => a.dist - b.dist);
  const topk = dists.slice(0, k);
  const votes = {};
  for (const t of topk) votes[t.label] = (votes[t.label] || 0) + 1;
  // pick max votes; tie chosen by smallest average distance
  let best = null, bestCount = -1;
  for (const l in votes) {
    if (votes[l] > bestCount) { bestCount = votes[l]; best = Number(l); }
  }
  const conf = bestCount / k;
  return { pred: best, conf, dists };
}

/* =========================
   Heuristics (fallback when not trained)
   ========================= */

function heuristicLabel(feats) {
  const c = feats.centroid || 0;
  if (c <= 120) return 2; // kick
  if (c >= 200) return 1; // snare
  if (c < 140) return 3; // low tom
  if (c < 170) return 4; // mid tom
  return 5; // high tom
}
function heuristicLabelObj(vec) { return 2; }

/* =========================
   UI & helpers
   ========================= */

function displayFrequencyForClass(classId) {
  const hz = BENCHMARK_FREQ[classId];
  if (hz) {
    const s = smoothDisplay(hz);
    bigDisplay.textContent = Math.round(s) + ' Hz';
  } else {
    bigDisplay.textContent = 'unknown';
  }
}

function smoothDisplay(value) {
  displayBuf.push(value);
  if (displayBuf.length > DISPLAY_SMOOTH) displayBuf.shift();
  const sum = displayBuf.reduce((a,b) => a + b, 0);
  return sum / displayBuf.length;
}

function labelName(id) {
  return id === 1 ? 'snare' : id === 2 ? 'kick' : id === 3 ? 'low tom' : id === 4 ? 'mid tom' : 'high tom';
}

function updateCountsUI() {
  for (const id of [1,2,3,4,5]) countEls[id].textContent = rawSamples[id].length;
  clfEl.textContent = featureMeans ? 'trained' : 'untrained';
}

/* =========================
   Calibration control wrappers
   ========================= */

function startCalibration(classId) {
  if (!isRunning) { alert('Start audio first'); return; }
  if (![1,2,3,4,5].includes(classId)) return;
  calibratingClass = classId;
  mode = 'calibrate';
  statusEl.textContent = `Calibrating ${labelName(classId)} — hit the drum ${samplesPerClass} times.`;
}

/* Train classifier (compute normalization) */
function trainClassifier() {
  for (const id of [1,2,3,4,5]) {
    if (rawSamples[id].length < samplesPerClass) {
      alert(`Need ${samplesPerClass} samples for each class. Class ${labelName(id)} has ${rawSamples[id].length}.`);
      return;
    }
  }
  computeNormalization();
  statusEl.textContent = 'Trained — press Live to classify.';
}

/* Activate live mode */
function activateLive() {
  if (!isRunning) { alert('Start audio first'); return; }
  mode = 'live';
  statusEl.textContent = 'Live mode — outputting benchmark frequency only.';
}

/* Reset calibration */
function resetCalibration() {
  if (!confirm('Reset calibration?')) return;
  for (const id of [1,2,3,4,5]) rawSamples[id] = [];
  featureMeans = null;
  featureStds = null;
  normalizedSamples = {1:[],2:[],3:[],4:[],5:[]};
  statusEl.textContent = 'Calibration reset.';
  updateCountsUI();
  bigDisplay.textContent = 'idle';
}

/* Export calibration JSON */
function exportCalibration() {
  if (!featureMeans) { alert('No trained calibration to export'); return; }
  const out = { featureMeans, featureStds, rawSamples };
  const blob = new Blob([JSON.stringify(out)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'drum_calibration.json';
  a.click();
  URL.revokeObjectURL(url);
}

/* Import calibration JSON */
function importCalibrationFile(ev) {
  const f = ev.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const json = JSON.parse(e.target.result);
      if (json.featureMeans && json.featureStds && json.rawSamples) {
        featureMeans = json.featureMeans;
        featureStds = json.featureStds;
        for (const id of [1,2,3,4,5]) rawSamples[id] = json.rawSamples[id] || [];
        computeNormalization(); // ensure normalizedSamples built
        statusEl.textContent = 'Imported calibration. Press Live to classify.';
        updateCountsUI();
      } else alert('Invalid calibration file.');
    } catch (err) {
      alert('Invalid JSON: ' + err.message);
    }
  };
  reader.readAsText(f);
}

/* =========================
   Debug helpers (verbose)
   ========================= */

function debugLog(txt) {
  const t = typeof txt === 'string' ? txt : JSON.stringify(txt, null, 2);
  debugEl.textContent = t;
  console.log('[DBG]', txt);
}

function debugUpdate(feats, vec, pred, conf, dists) {
  // Print pred as frequency in debug
  const freq = BENCHMARK_FREQ[pred] ? BENCHMARK_FREQ[pred] + 'Hz' : 'n/a';
  const lines = [];
  lines.push(`pred: ${pred} (freq:${freq}) conf:${Math.round((conf||0)*100)}%`);
  if (feats) {
    lines.push(`centroid:${Math.round(feats.centroid)}Hz peak:${Math.round(feats.peakFreq)}Hz`);
    lines.push(`low/mid/high: ${feats.lowR.toFixed(2)}/${feats.midR.toFixed(2)}/${feats.highR.toFixed(2)}`);
    lines.push(`attack:${Math.round(feats.attackMs)}ms pk/RMS:${feats.peakToRms.toFixed(2)} decayR:${feats.decayRatio.toFixed(2)}`);
    lines.push(`acStr:${feats.acStrength.toFixed(3)} rms:${feats.rms.toFixed(4)}`);
  }
  if (vec) lines.push('norm vec: ' + vec.map(v => v.toFixed(2)).join(', '));
  if (dists) lines.push('nearest:' + dists.slice(0,6).map(x => `${x.label}:${x.dist.toFixed(2)}`).join(', '));
  debugLog(lines.join('\n'));
}

/* =========================
   Final ready state
   ========================= */

debugLog('Expanded calibrator ready. Benchmarks: ' + JSON.stringify(BENCHMARK_FREQ));
</script>
